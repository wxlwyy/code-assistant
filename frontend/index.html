<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>


<!--
index.html 是单页面应用的唯一 HTML 入口。浏览器输入地址后，首先加载它。
因为 Vite 开发服务器默认将项目根目录下的 index.html 作为入口。这个配置在 vite.config.ts 没有显式指定时，就是默认值。
浏览器加载：浏览器访问 http://localhost:5173，服务器返回的就是这个 index.html。
<script src="/src/main.ts">：告诉浏览器“去加载并执行 main.ts 这个 JavaScript 文件”。type="module" 表示使用 ES Module 方式。
-->
